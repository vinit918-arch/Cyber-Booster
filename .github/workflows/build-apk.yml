name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        # Cache ko hata diya hai taaki build bina kisi validation error ke force-start ho sake

    - name: Build with Gradle
      run: |
        # Pure workspace me check karne ke liye ki gradlew wrapper kahan chhipa hai
        GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file pure project me kahin nahi mili!"
          exit 1
        fi
        
        DIR_PATH=$(dirname "$GRADLEW_PATH")
        cd "$DIR_PATH"
        
        echo "Gradle wrapper found at: $GRADLEW_PATH"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Generated APK
      uses: actions/upload-artifact@v4
      with:
        name: Cyber-Booster-Debug-APK
        path: "**/build/outputs/apk/debug/*-debug.apk"

