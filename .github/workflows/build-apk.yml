name: Build Android APK from AI Studio Code

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Complete Android Architecture
      run: |
        echo "=== Creating Android Project Framework ==="
        
        # 1. All Base Structures Generate Karna (Res directories included)
        mkdir -p app/src/main/java/com/gameturbo/redmagic
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # 2. Fix AndroidX Properties File
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        
        # 3. Root settings.gradle Engine
        echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
        echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }" >> settings.gradle
        echo "rootProject.name = 'Cyber-Booster'" >> settings.gradle
        echo "include ':app'" >> settings.gradle

        # 4. Root build.gradle
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        plugins {
            id 'com.android.application' version '8.2.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
        }
        EOF

        # 5. App Module build.gradle (Jetpack Compose Loaded)
        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.gameturbo.redmagic'
            compileSdk 34
            defaultConfig {
                applicationId "com.gameturbo.redmagic"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
                testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
                vectorDrawables { useSupportLibrary true }
            }
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
            buildFeatures { compose true }
            composeOptions { kotlinCompilerExtensionVersion '1.5.8' }
            packagingOptions { resources { excludes += '/META-INF/{AL2.0,LGPL2.1}' } }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
            implementation 'androidx.activity:activity-compose:1.8.2'
            implementation platform('androidx.compose:compose-bom:2024.02.00')
            implementation 'androidx.compose.ui:ui'
            implementation 'androidx.compose.ui:ui-graphics'
            implementation 'androidx.compose.ui:ui-tooling-preview'
            implementation 'androidx.compose.material3:material3'
        }
        EOF

        # 6. Gaming forced Landscape Manifest Setup
        cat <<EOF > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="Cyber Booster"
                android:theme="@android:style/Theme.Material.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:screenOrientation="landscape"
                    android:configChanges="orientation|screenSize|keyboardHidden">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 7. Basic Theme definitions and Colors
        echo '<resources><color name="purple_200">#FFBB86FC</color></resources>' > app/src/main/res/values/colors.xml

        # 🔥 FIX: XML based default Vector Launcher Icon generate karna taaki AAPT crash na ho
        cat <<EOF > app/src/main/res/mipmap-hdpi/ic_launcher.xml
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path
                android:fillColor="#00FFCC"
                android:pathData="M0,0h108v108h-108z"/>
        </vector>
        EOF
        
        # Baaki saare density folders me link generate karna fallback ke liye
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-mdpi/ic_launcher.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-xhdpi/ic_launcher.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-xxhdpi/ic_launcher.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-xxxhdpi/ic_launcher.xml

        # 8. AI Studio wale MainActivity ko injection point par set karna
        if [ -f MainActivity.kt ]; then
            cp MainActivity.kt app/src/main/java/com/gameturbo/redmagic/MainActivity.kt
        elif [ -f app/src/main/java/com/gameturbo/redmagic/MainActivity.kt ]; then
            echo "MainActivity already in position."
        else
            echo "Warning: Placeholder generated."
        fi

        # 9. Setup fresh Gradle Wrapper
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Run Heavy Complete & Build APK
      run: ./gradlew :app:assembleDebug

    - name: Deliver Cyber-Booster APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cyber-Booster-Handheld-APK
        path: "app/build/outputs/apk/debug/app-debug.apk"

